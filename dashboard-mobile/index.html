      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",cursor:"pointer"}} onClick={()=>setOpenId(openId===c.id?null:c.id)}>
        <Thumb src={c.productImg} size={40}/>
        <div style={{flex:1}}><div style={{fontSize:15,fontWeight:500,color:T.text}}>{c.productEn}</div><div style={{fontSize:13,color:T.textSec}}>Bid ¥{c.bid.toLocaleString()} · {c.applicants.filter(a=>a.status!=="rejected").length} applicants</div></div>
        <Ic n={openId===c.id?"chevUp":"chevDown"} s={16} color={T.textSec}/>
      </div>
      {openId===c.id&&<div style={{borderTop:`1px solid ${T.hairline}`,padding:"12px 16px 14px"}}>
        {c.applicants.filter(a=>a.status!=="rejected").map(a=>(<div key={a.id} style={{background:T.surfaceCool,borderRadius:T.rs,padding:"12px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:a.status==="counter"?10:6}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:T.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600}}>{a.name[0]}</div>
            <span style={{fontSize:14,fontWeight:600,color:T.text}}>{a.name}</span>
            <span style={{display:"flex",gap:3}}>{a.hasIg&&<IgIc/>}{a.hasTk&&<TkIc/>}</span>
            {a.status==="accepted"&&a.paid&&<Badge label="Paid" bg="#DCFCE7" color={T.success}/>}
            {a.status==="accepted"&&a.postUrl&&!a.paid&&<Badge label="Posted" bg="#DBEAFE" color="#2563EB"/>}
            {a.status==="accepted"&&a.dispatched&&!a.postUrl&&<Badge label="Dispatched" bg="#FEF3C7" color={T.warning}/>}
            {a.status==="accepted"&&!a.dispatched&&<Badge label="Pending" bg="#FEF3C7" color={T.warning}/>}
          </div>
          {a.status==="counter"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:T.warning,fontWeight:500}}>Counter: ¥{a.counterAmt?.toLocaleString()}</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>updateApp(c.id,a.id,{status:"accepted",dispatched:false,postUrl:null,paid:false})} style={{...btnSm,background:T.primary,color:"#fff",border:"none",padding:"5px 12px"}}>Accept</button>
              <button onClick={()=>updateApp(c.id,a.id,{status:"rejected"})} style={{...btnSm,background:"transparent",color:T.error,border:`1px solid ${T.error}`,padding:"5px 12px"}}>Reject</button>
            </div>
          </div>}
          {a.status==="accepted"&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
            {!a.dispatched&&<button onClick={()=>updateApp(c.id,a.id,{dispatched:true})} style={{...btnSm,background:T.primary,color:"#fff",border:"none",fontSize:12,display:"flex",alignItems:"center",gap:4}}><Ic n="truck" s={12} color="#fff"/> Dispatch</button>}
            {a.postUrl&&!a.paid&&<><a href={a.postUrl} target="_blank" rel="noopener noreferrer" style={{...btnSm,background:"transparent",color:T.primary,border:`1px solid ${T.primary}`,textDecoration:"none",fontSize:12,display:"inline-flex",alignItems:"center",gap:4}}><Ic n="ext" s={12} color={T.primary}/> Post</a>
            <button onClick={()=>updateApp(c.id,a.id,{paid:true})} style={{...btnSm,background:T.success,color:"#fff",border:"none",fontSize:12}}>Mark paid</button></>}
            {a.postUrl&&!a.paid&&<span style={{fontSize:12,color:T.textSec,alignSelf:"center"}}>¥{a.payAmt?.toLocaleString()}</span>}
          </div>}
        </div>))}
      </div>}
    </div>)}
    {tab==="bidding"&&filt(a=>a.status==="counter").map(a=>(<div key={a.id} style={{...cardS,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
      <Thumb src={a.campaign.productImg} size={36}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.campaign.productEn}</div><div style={{fontSize:12,color:T.textSec}}>{a.name} · ¥{a.counterAmt?.toLocaleString()}</div></div>
      <button onClick={()=>updateApp(a.campaign.id,a.id,{status:"accepted",dispatched:false,postUrl:null,paid:false})} style={{...btnSm,background:T.primary,color:"#fff",border:"none",fontSize:12}}>Accept</button>
    </div>))}
    {tab==="dispatch"&&filt(a=>a.status==="accepted"&&!a.dispatched).map(a=>(<div key={a.id} style={{...cardS,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
      <Thumb src={a.campaign.productImg} size={36}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.campaign.productEn}</div><div style={{fontSize:12,color:T.textSec}}>{a.name}</div></div>
      <button onClick={()=>updateApp(a.campaign.id,a.id,{dispatched:true})} style={{...btnSm,background:T.primary,color:"#fff",border:"none",fontSize:12}}>Dispatch</button>
    </div>))}
    {tab==="posts"&&filt(a=>a.status==="accepted"&&a.dispatched&&a.postUrl).map(a=>(<div key={a.id} style={{...cardS,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
      <Thumb src={a.campaign.productImg} size={36}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.campaign.productEn}</div><div style={{fontSize:12,color:T.textSec}}>{a.name}</div></div>
      <a href={a.postUrl} target="_blank" rel="noopener noreferrer" style={{...btnSm,background:"transparent",color:T.primary,border:`1px solid ${T.primary}`,textDecoration:"none",fontSize:12}}>View</a>
    </div>))}
    {tab==="payment"&&filt(a=>a.status==="accepted"&&a.postUrl&&!a.paid).map(a=>(<div key={a.id} style={{...cardS,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
      <Thumb src={a.campaign.productImg} size={36}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.campaign.productEn}</div><div style={{fontSize:12,color:T.textSec}}>{a.name} · ¥{a.payAmt?.toLocaleString()}</div></div>
      <button onClick={()=>updateApp(a.campaign.id,a.id,{paid:true})} style={{...btnSm,background:T.success,color:"#fff",border:"none",fontSize:12}}>Mark paid</button>
    </div>))}
    <div style={{textAlign:"center",padding:"24px 0 8px",fontSize:12,color:T.textPh}}>support@stitchify.ai</div>
  </div>)};

// ── PROFILE ──
const ProfilePage=()=>(<div style={{padding:"20px 16px 100px"}}>
  <div style={{fontSize:22,fontWeight:700,color:T.text,marginBottom:20}}>Profile</div>
  <div style={{...cardS,padding:"20px 16px",boxShadow:T.shadow}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20}}>
      <div style={{width:72,height:72,borderRadius:"50%",background:T.surfaceSubtle,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${T.border}`,marginBottom:10}}><Ic n="camera" s={24} color={T.textPh}/></div>
      <button style={{...btnSm,background:T.surfaceSubtle,color:T.primary,border:"none",fontSize:13}}><Ic n="upload" s={13}/> Upload photo</button>
    </div>
    <Field label="Contact person"><input style={inpS} defaultValue="Kenji Yamamoto"/></Field>
    <Field label="Brand name"><input style={inpS} defaultValue="MUJI Studio"/></Field>
    <Field label="Email"><input type="email" style={inpS} defaultValue="kenji@mujistudio.jp"/></Field>
    <Field label="Phone"><input style={inpS} defaultValue="+81 90-1234-5678"/></Field>
    <Field label="Instagram"><input style={inpS} defaultValue="@mujistudio"/></Field>
    <Field label="TikTok"><input style={inpS} defaultValue="@mujistudio"/></Field>
    <Field label="Website"><input type="url" style={inpS} defaultValue="https://mujistudio.jp"/></Field>
    <button style={btnP}>Save profile</button>
  </div>
  <div style={{textAlign:"center",padding:"20px 0 8px",fontSize:12,color:T.textPh}}>support@stitchify.ai</div>
</div>);

// ── BOTTOM TAB BAR ──
const TabBar=({active,onChange})=>{
  const tabs=[{key:"home",icon:"home",label:"Home"},{key:"products",icon:"products",label:"Products"},{key:"campaigns",icon:"campaigns",label:"Campaigns"},{key:"profile",icon:"profile",label:"Profile"}];
  return(<div style={{position:"fixed",bottom:0,left:0,right:0,background:T.bg,borderTop:`1px solid ${T.hairline}`,display:"flex",padding:"8px 0 env(safe-area-inset-bottom,8px)",zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
    {tabs.map(t=>{const act=active===t.key;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:T.font}}>
      <div style={{width:28,height:28,borderRadius:10,background:act?T.surfaceSubtle:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 200ms"}}><Ic n={t.icon} s={20} color={act?T.primary:T.textPh}/></div>
      <span style={{fontSize:10,color:act?T.primary:T.textPh,fontWeight:act?600:400}}>{t.label}</span>
    </button>)})}
  </div>)};

// ── APP ──
function App(){
  const[auth,setAuth]=useState(false);const[pg,setPg]=useState("home");const[sub,setSub]=useState(null);const[editProd,setEditProd]=useState(null);
  const nav=useCallback(p=>{setPg(p);setSub(null);setEditProd(null)},[]);
  if(!auth)return<AuthPage onAuth={()=>setAuth(true)}/>;
  return(
    <div style={{minHeight:"100vh",background:T.surfaceCool,fontFamily:T.font,maxWidth:430,margin:"0 auto",position:"relative"}}>
      {/* Top bar */}
      <div style={{position:"sticky",top:0,zIndex:50,background:T.bg,borderBottom:`1px solid ${T.hairline}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <img src={resolveImg("LOGO_AUTH")} alt="Stitchify" style={{height:24}}/>
        <div style={{width:32,height:32,borderRadius:"50%",background:T.primary,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:600}}>M</div>
      </div>
      {/* Pages */}
      {pg==="home"&&<HomePage/>}
      {pg==="products"&&!sub&&!editProd&&<ProductsPage onAdd={()=>setSub("add")} onEdit={p=>setEditProd(p)}/>}
      {pg==="products"&&sub==="add"&&<ProductFormPage onBack={()=>setSub(null)}/>}
      {pg==="products"&&editProd&&<ProductFormPage onBack={()=>setEditProd(null)} product={editProd}/>}
      {pg==="campaigns"&&<CampaignsPage/>}
      {pg==="profile"&&<ProfilePage/>}
      <TabBar active={pg} onChange={nav}/>
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
